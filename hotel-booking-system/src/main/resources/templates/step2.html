<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra phòng - ABC Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #1a1a2e !important; }
        .booking-card { background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); padding: 40px; margin: 50px auto; max-width: 600px; }
        .form-control, .form-select { border-radius: 10px; padding: 12px 15px; }
        .btn-search { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; padding: 15px 50px; font-size: 1.1rem; border-radius: 50px; color: white; }
        .btn-search:hover { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); color: white; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-hotel me-2"></i>ABC Hotel
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Trang chủ</a>
                <a class="nav-link" href="/step1">Đặt phòng</a>
            </div>
        </div>
    </nav>

    <!-- Search Form -->
    <div class="container">
        <div class="booking-card">
            <h2 class="text-center mb-4">
                <i class="fas fa-search me-2 text-primary"></i>Kiểm tra phòng trống
            </h2>
            <p class="text-center text-muted mb-4">Chọn ngày và loại phòng bạn muốn</p>

            <form action="/step2/check" method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ngày đến</label>
                        <input type="date" class="form-control" name="checkIn" required th:value="${#temporals.createToday().plusDays(1)}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ngày đi</label>
                        <input type="date" class="form-control" name="checkOut" required th:value="${#temporals.createToday().plusDays(3)}">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Số khách</label>
                        <input type="number" class="form-control" name="guests" min="1" value="2" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Loại phòng</label>
                        <select class="form-select" name="roomType" required>
                            <option value="Single">Single - 500K</option>
                            <option value="Double" selected>Double - 850K</option>
                            <option value="Triple">Triple - 1.2M</option>
                            <option value="Suite">Suite - 1.5M</option>
                            <option value="VIP Suite">VIP Suite - 2.5M</option>
                        </select>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="/" class="btn btn-secondary btn-lg me-3 px-5">Hủy</a>
                    <button type="submit" class="btn btn-search">
                        <i class="fas fa-search me-2"></i>Tìm phòng
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
