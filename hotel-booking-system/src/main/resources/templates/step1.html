<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Phòng - ABC Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #1a1a2e !important; }
        .booking-card { background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); padding: 40px; margin: 50px auto; max-width: 800px; }
        .form-control, .form-select { border-radius: 10px; padding: 12px 15px; }
        .btn-submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; padding: 15px 50px; font-size: 1.1rem; border-radius: 50px; color: white; }
        .btn-submit:hover { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); color: white; transform: scale(1.05); }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-hotel me-2"></i>ABC Hotel
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Trang chủ</a>
            </div>
        </div>
    </nav>

    <!-- Booking Form -->
    <div class="container">
        <div class="booking-card">
            <h2 class="text-center mb-4">
                <i class="fas fa-calendar-plus me-2 text-primary"></i>Đặt Phòng
            </h2>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form action="/step1/submit" method="post">
                <!-- Thông tin khách -->
                <h5 class="mb-3 text-primary"><i class="fas fa-user me-2"></i>Thông tin khách hàng</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Họ tên *</label>
                        <input type="text" class="form-control" name="guestName" required placeholder="VD: Nguyễn Văn A">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Số điện thoại *</label>
                        <input type="tel" class="form-control" name="phone" required placeholder="VD: 0912345678">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" placeholder="VD: email@example.com">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Địa chỉ</label>
                        <input type="text" class="form-control" name="address" placeholder="VD: 123 Đường ABC, TP.HCM">
                    </div>
                </div>

                <hr class="my-4">

                <!-- Thông tin phòng -->
                <h5 class="mb-3 text-primary"><i class="fas fa-bed me-2"></i>Thông tin lưu trú</h5>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Ngày đến *</label>
                        <input type="date" class="form-control" name="checkIn" required th:value="${#temporals.createToday().plusDays(1)}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Ngày đi *</label>
                        <input type="date" class="form-control" name="checkOut" required th:value="${#temporals.createToday().plusDays(3)}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Số khách *</label>
                        <input type="number" class="form-control" name="numberOfGuests" required min="1" value="1">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Số buồng *</label>
                        <input type="number" class="form-control" name="numberOfRooms" required min="1" value="1">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Loại buồng *</label>
                        <select class="form-select" name="roomType" required>
                            <option value="Single">Single - 500,000 VND</option>
                            <option value="Double" selected>Double - 850,000 VND</option>
                            <option value="Triple">Triple - 1,200,000 VND</option>
                            <option value="Suite">Suite - 1,500,000 VND</option>
                            <option value="VIP Suite">VIP Suite - 2,500,000 VND</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Loại đặt *</label>
                        <select class="form-select" name="reservationType" required>
                            <option value="Đảm bảo">Đảm bảo (Guaranteed)</option>
                            <option value="Không đảm bảo">Không đảm bảo</option>
                        </select>
                    </div>
                </div>

                <hr class="my-4">

                <!-- Thanh toán -->
                <h5 class="mb-3 text-primary"><i class="fas fa-credit-card me-2"></i>Thanh toán & Nguồn</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Hình thức thanh toán *</label>
                        <select class="form-select" name="paymentMethod" required>
                            <option value="Tiền mặt">Tiền mặt</option>
                            <option value="Chuyển khoản">Chuyển khoản</option>
                            <option value="Thẻ tín dụng">Thẻ tín dụng</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nguồn đặt *</label>
                        <select class="form-select" name="bookingSource" required>
                            <option value="Gặp trực tiếp">Gặp trực tiếp</option>
                            <option value="Điện thoại">Điện thoại</option>
                            <option value="Email">Email</option>
                            <option value="Internet">Internet/Website</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Yêu cầu đặc biệt</label>
                    <textarea class="form-control" name="specialRequests" rows="3" placeholder="VD: Cần giường đôi, phòng không hút thuốc..."></textarea>
                </div>

                <!-- Hidden fields -->
                <input type="hidden" name="registrantName" value="">
                <input type="hidden" name="fax" value="">

                <div class="text-center mt-4">
                    <a href="/" class="btn btn-secondary btn-lg me-3 px-5">Hủy</a>
                    <button type="submit" class="btn btn-submit">
                        <i class="fas fa-search me-2"></i>Kiểm tra phòng trống
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
